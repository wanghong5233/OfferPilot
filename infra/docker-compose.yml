name: pulse-infra

services:
  postgres:
    image: postgres:16
    container_name: pulse-pg
    restart: unless-stopped
    environment:
      POSTGRES_DB: pulse
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: pulse
    ports:
      - "15433:5432"
    volumes:
      - pulse_pg_data:/var/lib/postgresql/data
      - ../backend/sql/init_db.sql:/docker-entrypoint-initdb.d/init_db.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d pulse"]
      interval: 10s
      timeout: 5s
      retries: 5

  pulse-api:
    build:
      context: ..
      dockerfile: Dockerfile
    container_name: pulse-api
    restart: unless-stopped
    environment:
      PULSE_ENVIRONMENT: docker
      PULSE_HOST: 0.0.0.0
      PULSE_PORT: 8010
      DATABASE_URL: postgresql://postgres:pulse@postgres:5432/pulse
      LANGGRAPH_CHECKPOINT_DATABASE_URL: postgresql://postgres:pulse@postgres:5432/pulse
      PULSE_CORE_MEMORY_PATH: /root/.pulse/core_memory.json
      PULSE_RECALL_COLLECTION_NAME: pulse_recall_memory
      PULSE_ARCHIVAL_COLLECTION_NAME: pulse_archival_memory
      PULSE_GOVERNANCE_AUDIT_PATH: /root/.pulse/governance_audit.json
      PULSE_GOVERNANCE_RULES_VERSIONS_PATH: /root/.pulse/governance_rules_versions.json
      PULSE_DPO_PAIRS_PATH: /root/.pulse/dpo_pairs.jsonl
      PULSE_GENERATED_SKILLS_DIR: /root/.pulse/generated/skills
      PULSE_ROUTER_RULES_PATH: /app/config/router_rules.json
      PULSE_POLICY_RULES_PATH: /app/config/policy_rules.json
      PULSE_EVOLUTION_RULES_PATH: /app/config/evolution_rules.json
      PULSE_SOUL_CONFIG_PATH: /app/config/soul.yaml
    volumes:
      - pulse_memory_data:/root/.pulse
    ports:
      - "8010:8010"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pulse_pg_data:
  pulse_memory_data:
