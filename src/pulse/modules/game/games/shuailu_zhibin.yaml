id: shuailu_zhibin
name: 率土之滨
package_candidates:
  - com.netease.stzb.netease
  - com.netease.stzb.mi
  - com.tencent.tmgp.stzb
main_activity: ""
driver: adb_airtest
schedule:
  enabled_by_default: false
  peak_interval_seconds: 86400
  offpeak_interval_seconds: 86400
  active_hours_only: true
  weekday_windows: [[9, 24]]
  weekend_windows: [[9, 24]]
templates_dir: shuailu_zhibin
tasks:
  - name: sign_in
    type: tap_template
    template: sign_in_button.png
  - name: monthly_yufu
    type: claim_chain
    templates:
      - monthly_card_entry.png
      - claim_yufu.png
  - name: mail_collect
    type: claim_chain
    templates:
      - mail_icon.png
      - claim_all.png
  - name: task_chart
    type: claim_chain
    templates:
      - task_chart_icon.png
      - claim_all.png
  - name: gacha_free
    type: gacha
    params:
      mode: free
      count: 1
      template: gacha_free_button.png
  - name: gacha_half
    type: gacha
    params:
      mode: half_price
      daily_max_pulls: 1
      template: gacha_half_button.png
risk_control:
  templates:
    - slider.png
    - captcha.png
    - account_anomaly.png
safety:
  default_dry_run: true
  jitter_ms: [200, 800]
  max_total_seconds: 300
publish:
  notifier_channels: [console, feishu]
  promote_archival_on: [ssr, limited, special_event]
